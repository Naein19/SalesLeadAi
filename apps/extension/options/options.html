<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadAI Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FAFAFA;
      color: #111827;
      padding: 24px;
      margin: 0;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      background: white;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      padding: 24px;
    }
    h1 {
      margin-top: 0;
      font-size: 1.5rem;
      color: #111827;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #D1D5DB;
      border-radius: 6px;
      font-size: 0.875rem;
      box-sizing: border-box;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #4F46E5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    button {
      background: #4F46E5;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      background: #4338CA;
    }
    .status {
      margin-top: 12px;
      font-size: 0.875rem;
      color: #16A34A;
      text-align: center;
      min-height: 20px;
    }
    .presets {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .preset-btn {
      background: #F3F4F6;
      color: #374151;
      padding: 4px 8px;
      font-size: 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid #E5E7EB;
      flex: 1;
    }
    .preset-btn:hover {
      background: #E5E7EB;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>LeadAI Extension Settings</h1>
    
    <div class="form-group">
      <label for="apiUrl">API Base URL</label>
      <div class="presets">
        <button id="presetLocal" class="preset-btn">Local (localhost:8000)</button>
        <button id="presetProduction" class="preset-btn">Production (Railway)</button>
      </div>
      <input type="text" id="apiUrl" placeholder="e.g. http://localhost:8000">
    </div>

    <button id="saveBtn">Save Settings</button>
    <div id="status" class="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
